    }
    el.querySelector('.edit-btn').addEventListener('click', () => openEdit(r.id));
    el.querySelector('.del-btn').addEventListener('click', () => {
      if (confirm(`¿Eliminar este registro de ${CAT[r.category].label}?`)) {
        state.records = state.records.filter(x => x.id !== r.id);
        saveRecords();
        render();
        toast('Registro eliminado');
      }
    });
    return el;
  }

  // ═══ STATS ═══
  function renderStats() {
    head.innerHTML = `<div class="eyebrow">Resumen</div><h1>Stats</h1>`;
    if (state.records.length === 0) {
      const emp = document.createElement('div');
      emp.className = 'empty';
      emp.innerHTML = `<div class="ilu">📊</div><h3>sin <em>datos</em> aún</h3><p>Cuando empieces a registrar sesiones, vas a ver acá tu total, distribución por categoría y el gráfico de 14 días.</p>`;
      body.appendChild(emp);
      return;
    }

    const chips = document.createElement('div');
    chips.className = 'chips';
    [7, 30, 'all'].forEach(r => {
      const c = document.createElement('div');
      c.className = 'chip' + (state.statsRange === r ? ' active' : '');
      c.textContent = r === 'all' ? 'Todo' : `${r} días`;
      c.addEventListener('click', () => { state.statsRange = r; render(); });
      chips.appendChild(c);
    });
    body.appendChild(chips);

    const recs = state.statsRange === 'all' ? state.records :
      state.records.filter(r => Date.now() - new Date(r.start).getTime() < state.statsRange * 86400000);

    const totalMs = recs.reduce((a, r) => a + r.duration, 0);
    const hrs = totalMs / 3600000;
    const total = document.createElement('div');
    total.className = 'total-card';
    const prev = state.statsRange === 'all' ? null : (() => {
      const s = state.statsRange * 86400000;
      const nowT = Date.now();
      const prevRecs = state.records.filter(r => { const t = new Date(r.start).getTime(); return (nowT - t) >= s && (nowT - t) < 2 * s; });
      return prevRecs.reduce((a,r)=>a+r.duration, 0) / 3600000;
    })();
    let deltaHtml = '';
    if (prev !== null && prev > 0) {
      const delta = ((hrs - prev) / prev * 100);
      const sign = delta >= 0 ? 'up' : 'down';
      const symbol = delta >= 0 ? '+' : '';
      deltaHtml = `<div class="delta">vs período anterior: <span class="${sign}">${symbol}${delta.toFixed(0)}%</span> · ${prev.toFixed(1)}h</div>`;
    } else if (prev !== null && prev === 0 && hrs > 0) {
      deltaHtml = `<div class="delta">primer período con actividad</div>`;
    }
    total.innerHTML = `
      <div class="eyebrow">Total ${state.statsRange === 'all' ? 'siempre' : `· últimos ${state.statsRange} días`}</div>
      <div class="big">${Math.floor(hrs)}<em>.${Math.round((hrs - Math.floor(hrs)) * 10)}</em><span class="unit">horas</span></div>
      ${deltaHtml}
    `;
    body.appendChild(total);

    if (recs.length > 0) {
      const donutSec = document.createElement('div');
      donutSec.className = 'donut-section';
      donutSec.innerHTML = `<h3>Por categoría</h3>`;
      const dw = document.createElement('div');
      dw.className = 'donut-wrap';
      dw.appendChild(buildDonut(recs));
      donutSec.appendChild(dw);

      const legend = document.createElement('div');
      legend.className = 'legend';
      const totalsByCat = {};
      recs.forEach(r => { totalsByCat[r.category] = (totalsByCat[r.category] || 0) + r.duration; });
      const sorted = Object.keys(totalsByCat).sort((a,b) => totalsByCat[b] - totalsByCat[a]);
      sorted.forEach(cid => {
        const c = CAT[cid];
        const lr = document.createElement('div');
        lr.className = 'leg-row';
        lr.style.setProperty('--cc', c.color);
        lr.innerHTML = `<div class="sw"></div><span class="name">${c.label}</span><span class="val">${fmtDur(totalsByCat[cid])}</span>`;
        legend.appendChild(lr);
      });
      donutSec.appendChild(legend);
      body.appendChild(donutSec);
    }

    const bc = document.createElement('div');
    bc.className = 'bars-card';
    bc.innerHTML = `<h3>Últimos 14 días</h3><div class="sub">horas por día · stacked por categoría</div>`;
    const bars = document.createElement('div');
    bars.className = 'bars';
    const today = new Date(); today.setHours(0,0,0,0);
    const dayData = [];
    for (let d = 13; d >= 0; d--) {
      const day = new Date(today); day.setDate(day.getDate() - d);
      const next = new Date(day); next.setDate(next.getDate() + 1);
      const dayRecs = state.records.filter(r => { const t = new Date(r.start).getTime(); return t >= day.getTime() && t < next.getTime(); });
      dayData.push({ day, recs: dayRecs, total: dayRecs.reduce((a,r)=>a+r.duration, 0) });
    }
    const maxDay = Math.max(...dayData.map(d => d.total), 1);
    dayData.forEach(({ day, recs, total }, i) => {
      const col = document.createElement('div');
      col.className = 'bar-col';
      if (i === dayData.length - 1) col.classList.add('today');
      const totalsByCatDay = {};
      recs.forEach(r => { totalsByCatDay[r.category] = (totalsByCatDay[r.category] || 0) + r.duration; });
      const sortedCats = Object.keys(totalsByCatDay).sort((a,b) => totalsByCatDay[b] - totalsByCatDay[a]);
      const heightPx = (total / maxDay) * 88;
      sortedCats.reverse().forEach(cid => {
        const seg = document.createElement('div');
        seg.className = 'seg';
        seg.style.background = CAT[cid].color;
        seg.style.height = (totalsByCatDay[cid] / total * heightPx) + 'px';
        col.appendChild(seg);
      });
      bars.appendChild(col);
    });
    bc.appendChild(bars);
    const bx = document.createElement('div');
    bx.className = 'bars-x';
    bx.innerHTML = `<span>hace 14d</span><span>hoy</span>`;
    bc.appendChild(bx);
    body.appendChild(bc);
  }

  function buildDonut(recs) {
    const size = 210, r = 80, cx = size/2, cy = size/2;
    const totals = {};
    recs.forEach(x => { totals[x.category] = (totals[x.category] || 0) + x.duration; });
    const total = Object.values(totals).reduce((a,b)=>a+b,0) || 1;
    let angle = -Math.PI/2;
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', size); svg.setAttribute('height', size);
    svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
    const ordered = CATEGORIES.filter(c => totals[c.id] > 0).sort((a,b) => totals[b.id] - totals[a.id]);
    ordered.forEach(c => {
      const v = totals[c.id];
      const a = (v / total) * 2 * Math.PI;
      const x1 = cx + Math.cos(angle) * r, y1 = cy + Math.sin(angle) * r;
      const x2 = cx + Math.cos(angle + a) * r, y2 = cy + Math.sin(angle + a) * r;
      const large = a > Math.PI ? 1 : 0;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      if (ordered.length === 1) {
        path.setAttribute('d', `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx - 0.01} ${cy - r} Z`);
      } else {
        path.setAttribute('d', `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`);
      }
      path.setAttribute('fill', c.color);
      path.setAttribute('stroke', '#f4efe4');
      path.setAttribute('stroke-width', '2');
      svg.appendChild(path);
      angle += a;
    });
    const hole = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    hole.setAttribute('cx', cx); hole.setAttribute('cy', cy); hole.setAttribute('r', 44); hole.setAttribute('fill', '#fbf8f1');
    svg.appendChild(hole);
    const t1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t1.setAttribute('x', cx); t1.setAttribute('y', cy - 2);
    t1.setAttribute('text-anchor','middle'); t1.setAttribute('font-family','Instrument Serif, serif');
    t1.setAttribute('font-size','30'); t1.setAttribute('font-style','italic'); t1.setAttribute('fill','#1f1b15');
    t1.textContent = `${(total/3600000).toFixed(1)}h`;
    svg.appendChild(t1);
    const t2 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t2.setAttribute('x', cx); t2.setAttribute('y', cy + 14);
    t2.setAttribute('text-anchor','middle'); t2.setAttribute('font-family','JetBrains Mono, monospace');
    t2.setAttribute('font-size','8'); t2.setAttribute('fill','#8a8273'); t2.setAttribute('letter-spacing','1.5');
    t2.textContent = 'TOTAL';
    svg.appendChild(t2);
    return svg;
  }

  // ═══ MODAL SHEET ═══
  const modalEl = document.getElementById('modal');
  const sheetEl = document.getElementById('sheet');

  function openModal(type) {
    state.modal = type;
    if (type === 'finish') sheetEl.innerHTML = finishSheetHtml();
    else if (type === 'cancel') sheetEl.innerHTML = cancelSheetHtml();
    else if (type === 'edit') sheetEl.innerHTML = editSheetHtml();
    else if (type === 'menu') sheetEl.innerHTML = menuSheetHtml();
    else if (type === 'exportFallback') sheetEl.innerHTML = exportFallbackHtml();
    bindSheet(type);
    modalEl.classList.add('open');
    manageTicker();
  }

  function closeModal() {
    state.modal = null;
    state.editingId = null;
    if (state.finishTimerId) { clearInterval(state.finishTimerId); state.finishTimerId = null; }
    modalEl.classList.remove('open');
    manageTicker();
  }

  modalEl.addEventListener('click', e => { if (e.target === modalEl) closeModal(); });

  function openFinish() { if (!state.active) return; openModal('finish'); }
  function openCancel() { if (!state.active) return; openModal('cancel'); }
  function openEdit(id) { state.editingId = id; openModal('edit'); }
  function openMenu() { openModal('menu'); }

  function finishSheetHtml() {
    const c = CAT[state.active.category];
    const ms = Date.now() - new Date(state.active.start).getTime();
    return `
      <div class="grabber"></div>
      <h2 style="--cc:${c.color}">Terminar <em>${c.label.toLowerCase()}</em></h2>
      <div class="finish-summary" style="--cc:${c.color}">
        <div class="ic" style="background:${c.color}">${c.icon}</div>
        <div class="meta">
          <div class="t" id="finishTimer">${fmtTimer(ms)}</div>
          <div class="r">desde ${fmtClock(state.active.start)} · hasta ahora</div>
        </div>
      </div>
      <label>Foto</label>
      ${photoSlotHtml('finishPhotoSlot', state.active.photo, { addLabel: 'Agregar foto', hasLabel: 'Foto adjunta' })}
      <label>Comentario</label>
      <textarea rows="2" id="finishNote" placeholder="qué hiciste…">${escapeHtml(state.active.comment || '')}</textarea>
      <div class="sheet-actions">
        <button class="sheet-btn" id="finishBack">Volver</button>
        <button class="sheet-btn primary" id="finishSave">Guardar</button>
      </div>
    `;
  }

  function cancelSheetHtml() {
    const c = CAT[state.active.category];
    const ms = Date.now() - new Date(state.active.start).getTime();
    return `
      <div class="grabber"></div>
      <h2>¿Descartar sesión?</h2>
      <p style="font-family:'Instrument Serif',serif;font-style:italic;color:var(--ink-2);font-size:15px;line-height:1.5;margin:0 0 18px">
        Llevás <strong style="font-style:normal;color:var(--ink)">${fmtDur(ms)}</strong> en
        <strong style="font-style:normal;color:${c.color}">${c.label.toLowerCase()}</strong>. No se guardará ningún registro${state.active.photo ? ' (la foto también se descarta)' : ''}.
      </p>
      <div class="sheet-actions">
        <button class="sheet-btn" id="cancelBack">Seguir</button>
        <button class="sheet-btn danger" id="cancelDiscard">Descartar</button>
      </div>
    `;
  }

  function editSheetHtml() {
    const r = state.records.find(x => x.id === state.editingId);
    if (!r) return '';
    const c = CAT[r.category];
    return `
      <div class="grabber"></div>
      <h2 style="--cc:${c.color}">Editar <em>registro</em></h2>
      <label>Categoría</label>
      <div class="cat-picker" id="catPicker">
        ${CATEGORIES.map(cat => `
          <div class="cp ${cat.id===r.category?'selected':''}" data-id="${cat.id}" style="--cc:${cat.color}">
            <span style="font-size:16px">${cat.icon}</span>
            <span>${cat.label}</span>
          </div>
        `).join('')}
      </div>
      <label>Foto</label>
      ${photoSlotHtml('editPhotoSlot', r.photo, { addLabel: 'Agregar foto', hasLabel: 'Foto adjunta' })}
      <label>Inicio</label>
      <input type="datetime-local" id="editStart" value="${toDateTimeLocal(r.start)}" />
      <label>Fin</label>
      <input type="datetime-local" id="editEnd" value="${toDateTimeLocal(r.end)}" />
      <label>Comentario</label>
      <textarea rows="2" id="editNote">${escapeHtml(r.comment || '')}</textarea>
      <div class="sheet-actions">
        <button class="sheet-btn" id="editBack">Cancelar</button>
        <button class="sheet-btn primary" id="editSave">Guardar</button>
      </div>
    `;
  }

  function menuSheetHtml() {
    return `
      <div class="grabber"></div>
      <div class="menu-sheet">
        <h2>Kronos <em style="font-size:16px;font-style:italic;color:var(--ink-3)">v2</em></h2>
        <button class="menu-item" id="miExport">
          <div class="mi-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
          <div class="mi-txt">Exportar datos<span class="mi-sub">${state.records.length} registros · JSON (incluye fotos)</span></div>
        </button>
        <button class="menu-item" id="miImport">
          <div class="mi-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
          <div class="mi-txt">Importar JSON<span class="mi-sub">reemplaza o fusiona datos</span></div>
        </button>
        <button class="menu-item danger" id="miReset">
          <div class="mi-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></div>
          <div class="mi-txt">Borrar todo<span class="mi-sub">registros + sesión activa</span></div>
        </button>
      </div>
    `;
  }

  function exportFallbackHtml() {
    const data = { version: 2, exportedAt: new Date().toISOString(), records: state.records };
    const jsonStr = JSON.stringify(data, null, 2);
    return `
      <div class="grabber"></div>
      <h2>Exportar <em>JSON</em></h2>
      <p style="font-family:'Instrument Serif',serif;font-style:italic;color:var(--ink-2);font-size:14px;line-height:1.5;margin:0 0 14px">
        Tu navegador no permitió la descarga directa. Copiá el texto y pegalo en una nota o archivo.
      </p>
      <label>${state.records.length} registros</label>
      <textarea id="exportText" readonly rows="10" style="font-family:'JetBrains Mono',monospace;font-size:11px;max-height:240px;overflow:auto">${escapeHtml(jsonStr)}</textarea>
      <div class="sheet-actions">
        <button class="sheet-btn" id="exportClose">Cerrar</button>
        <button class="sheet-btn primary" id="exportCopy">Copiar todo</button>
      </div>
    `;
  }

  function bindSheet(type) {
    if (state.finishTimerId) { clearInterval(state.finishTimerId); state.finishTimerId = null; }

    if (type === 'finish') {
      const timerEl = sheetEl.querySelector('#finishTimer');
      state.finishTimerId = setInterval(() => {
        if (!state.active) { clearInterval(state.finishTimerId); state.finishTimerId = null; return; }
        const ms = Date.now() - new Date(state.active.start).getTime();
        const el = document.getElementById('finishTimer');
        if (el) el.textContent = fmtTimer(ms);
      }, 1000);

      bindPhotoSlot('finishPhotoSlot',
        () => state.active ? state.active.photo : null,
        (p) => { if (state.active) { state.active.photo = p; saveActive(); } },
        () => refreshPhotoSlot('finishPhotoSlot',
          () => state.active ? state.active.photo : null,
          (p) => { if (state.active) { state.active.photo = p; saveActive(); } },
          { addLabel: 'Agregar foto', hasLabel: 'Foto adjunta' }
        )
      );

      sheetEl.querySelector('#finishBack').addEventListener('click', closeModal);
      sheetEl.querySelector('#finishSave').addEventListener('click', () => {
        const note = sheetEl.querySelector('#finishNote').value.trim();
        saveActiveAsRecord(note);
        closeModal();
        render();
        toast('Sesión guardada');
      });
    }
    else if (type === 'cancel') {
      sheetEl.querySelector('#cancelBack').addEventListener('click', closeModal);
      sheetEl.querySelector('#cancelDiscard').addEventListener('click', () => {
        state.active = null; saveActive(); closeModal(); render(); toast('Sesión descartada');
      });
    }
    else if (type === 'edit') {
      let newCat = state.records.find(x => x.id === state.editingId)?.category;
      // Photo state is edited in-place on a temp ref that gets applied on Save
      // But for simpler UX, we mutate the record directly for the photo (save will still save all state).
      // This means cancel-after-photo-change keeps the photo change. Acceptable for this app.
      bindPhotoSlot('editPhotoSlot',
        () => { const r = state.records.find(x => x.id === state.editingId); return r ? r.photo : null; },
        (p) => { const r = state.records.find(x => x.id === state.editingId); if (r) { r.photo = p; saveRecords(); } },
        () => refreshPhotoSlot('editPhotoSlot',
          () => { const r = state.records.find(x => x.id === state.editingId); return r ? r.photo : null; },
          (p) => { const r = state.records.find(x => x.id === state.editingId); if (r) { r.photo = p; saveRecords(); } },
          { addLabel: 'Agregar foto', hasLabel: 'Foto adjunta' }
        )
      );

      sheetEl.querySelectorAll('.cp').forEach(el => el.addEventListener('click', () => {
        sheetEl.querySelectorAll('.cp').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
        newCat = el.dataset.id;
      }));
      sheetEl.querySelector('#editBack').addEventListener('click', closeModal);
      sheetEl.querySelector('#editSave').addEventListener('click', () => {
        const startV = sheetEl.querySelector('#editStart').value;
        const endV = sheetEl.querySelector('#editEnd').value;
        const note = sheetEl.querySelector('#editNote').value.trim();
        if (!startV || !endV) { toast('Fechas inválidas'); return; }
        const startMs = new Date(startV).getTime();
        const endMs = new Date(endV).getTime();
        if (isNaN(startMs) || isNaN(endMs)) { toast('Fechas inválidas'); return; }
        if (endMs <= startMs) { toast('El fin debe ser posterior al inicio'); return; }
        const r = state.records.find(x => x.id === state.editingId);
        if (!r) return;
        r.category = newCat;
        r.start = new Date(startV).toISOString();
        r.end = new Date(endV).toISOString();
        r.duration = endMs - startMs;
        r.comment = note || null;
        state.records.sort((a,b) => new Date(b.start) - new Date(a.start));
        saveRecords();
        closeModal();
        render();
        toast('Registro actualizado');
      });
    }
    else if (type === 'menu') {
      sheetEl.querySelector('#miExport').addEventListener('click', () => { closeModal(); setTimeout(exportJSON, 100); });
      sheetEl.querySelector('#miImport').addEventListener('click', () => { closeModal(); document.getElementById('fileIn').click(); });
      sheetEl.querySelector('#miReset').addEventListener('click', () => {
        if (!confirm('Borrar TODOS los registros y cualquier sesión activa? No se puede deshacer.')) return;
        state.records = []; state.active = null;
        saveRecords(); saveActive();
        closeModal(); render(); toast('Todo borrado');
      });
    }
    else if (type === 'exportFallback') {
      sheetEl.querySelector('#exportClose').addEventListener('click', closeModal);
      sheetEl.querySelector('#exportCopy').addEventListener('click', async () => {
        const txt = sheetEl.querySelector('#exportText');
        try { await navigator.clipboard.writeText(txt.value); toast('Copiado al portapapeles'); }
        catch (err) {
          txt.select(); txt.setSelectionRange(0, txt.value.length);
          try { document.execCommand('copy'); toast('Copiado'); }
          catch (e) { toast('Seleccioná y copiá manualmente'); }
        }
      });
    }
  }

  function saveActiveAsRecord(comment) {
    if (!state.active) return;
    const end = new Date().toISOString();
    const duration = new Date(end).getTime() - new Date(state.active.start).getTime();
    if (duration < 1000) {
      state.active = null; saveActive(); toast('Sesión muy corta'); return;
    }
    const rec = {
      id: uid(),
      category: state.active.category,
      start: state.active.start,
      end,
      duration,
      comment: comment || state.active.comment || null,
      photo: state.active.photo || null,
    };
    state.records.unshift(rec);
    state.records.sort((a,b) => new Date(b.start) - new Date(a.start));
    state.active = null;
    saveRecords();
    saveActive();
  }

  // ═══ EXPORT / IMPORT ═══
  async function exportJSON() {
    const data = { version: 2, exportedAt: new Date().toISOString(), records: state.records };
    const jsonStr = JSON.stringify(data, null, 2);
    const stamp = new Date().toISOString().slice(0, 10);
    const filename = `kronos-${stamp}.json`;

    try {
      if (navigator.canShare && navigator.share) {
        const file = new File([jsonStr], filename, { type: 'application/json' });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: 'Kronos backup' });
          toast(`${state.records.length} registros exportados`);
          return;
        }
      }
    } catch (err) {
      if (err && err.name === 'AbortError') return;
    }

    try {
      if (navigator.share) {
        await navigator.share({ title: filename, text: jsonStr });
        toast(`${state.records.length} registros exportados`);
        return;
      }
    } catch (err) {
      if (err && err.name === 'AbortError') return;
    }

    try {
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.rel = 'noopener'; a.target = '_self';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      toast(`${state.records.length} registros exportados`);
      return;
    } catch (err) {}

    openModal('exportFallback');
  }

  document.getElementById('fileIn').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const incoming = Array.isArray(data) ? data : data.records;
        if (!Array.isArray(incoming)) throw new Error('formato inválido');
        const valid = incoming.filter(r => r && r.category && CAT[r.category] && r.start && r.end);
        if (valid.length === 0) { toast('Sin registros válidos'); return; }
        const mode = state.records.length > 0
          ? (confirm(`${valid.length} registros en el archivo.\n\nOK = Fusionar (evita duplicados por fecha)\nCancelar = Reemplazar todo`) ? 'merge' : 'replace')
          : 'replace';
        const normalize = r => ({
          id: r.id || uid(),
          category: r.category,
          start: r.start,
          end: r.end,
          duration: r.duration || (new Date(r.end).getTime() - new Date(r.start).getTime()),
          comment: r.comment || null,
          photo: r.photo || null,
        });
        if (mode === 'replace') state.records = valid.map(normalize);
        else state.records = mergeRecords(state.records, valid.map(normalize));
        state.records.sort((a,b) => new Date(b.start) - new Date(a.start));
        saveRecords();
        render();
        toast(`${valid.length} registros importados`);
      } catch (err) {
        toast('Archivo inválido');
      }
      e.target.value = '';
    };
    reader.readAsText(f);
  });

  function mergeRecords(existing, incoming) {
    const byStart = new Set(existing.map(r => r.start));
    const added = incoming.filter(r => !byStart.has(r.start));
    return [...existing, ...added];
  }

  // ═══ LIGHTBOX CLOSE HANDLER ═══
  document.getElementById('lbClose').addEventListener('click', e => { e.stopPropagation(); closeLightbox(); });

  // ═══ EVENT WIRING ═══
  document.querySelectorAll('.nav .tab').forEach(t => {
    t.addEventListener('click', () => { state.tab = t.dataset.tab; render(); });
  });
  menuBtn.addEventListener('click', openMenu);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && state.tab === 'registro' && state.active) updateTimer();
  });

  render();

  window.__kronos = { state, save: () => { saveRecords(); saveActive(); } };
})();
</script>
</body>
</html>
